<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="title desc">
  <title id="title">Automation and data systems diagram</title>
  <desc id="desc">A layered technical diagram showing data inputs, automation logic, diagnostics, and optimized runtime components.</desc>
  <rect width="900" height="640" rx="34" fill="#f7faf8"/>
  <rect x="58" y="64" width="784" height="512" rx="26" fill="#ffffff" stroke="#d9e2df" stroke-width="3"/>
  <g fill="none" stroke="#176b5a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M182 154h148c42 0 62 24 62 62v54"/>
    <path d="M392 368v54c0 38 20 62 62 62h264"/>
    <path d="M182 484h110c62 0 100-38 100-100V270"/>
    <path d="M520 154h94c46 0 76 30 76 76v74"/>
  </g>
  <g>
    <rect x="112" y="112" width="170" height="84" rx="14" fill="#eef5f2" stroke="#b9cbc5" stroke-width="2"/>
    <text x="142" y="147" fill="#18201f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Data inputs</text>
    <text x="142" y="174" fill="#5f6c69" font-family="Arial, sans-serif" font-size="15">signals + logs</text>
  </g>
  <g>
    <rect x="340" y="236" width="210" height="142" rx="18" fill="#176b5a"/>
    <text x="384" y="295" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Automation</text>
    <text x="384" y="327" fill="#d7e5df" font-family="Arial, sans-serif" font-size="17">orchestration layer</text>
  </g>
  <g>
    <rect x="568" y="112" width="180" height="94" rx="14" fill="#fff7e8" stroke="#e8c77f" stroke-width="2"/>
    <text x="604" y="149" fill="#18201f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Models</text>
    <text x="604" y="176" fill="#5f6c69" font-family="Arial, sans-serif" font-size="15">ML + vision</text>
  </g>
  <g>
    <rect x="118" y="438" width="192" height="88" rx="14" fill="#fdf0ed" stroke="#e3afa4" stroke-width="2"/>
    <text x="151" y="474" fill="#18201f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Diagnostics</text>
    <text x="151" y="501" fill="#5f6c69" font-family="Arial, sans-serif" font-size="15">statistics + features</text>
  </g>
