    <text x="646" y="474" fill="#18201f" font-family="Arial, sans-serif" font-size="20" font-weight="700">Runtime</text>
    <text x="646" y="501" fill="#5f6c69" font-family="Arial, sans-serif" font-size="15">Python + Rust</text>
  </g>
  <g fill="#d99a2b">
    <circle cx="392" cy="154" r="15"/>
    <circle cx="392" cy="484" r="15"/>
    <circle cx="690" cy="304" r="15"/>
